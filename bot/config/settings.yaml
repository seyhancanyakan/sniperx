broker:
  provider: "mt5_bridge"
  mt5_login: 0
  mt5_password: ""
  mt5_server: "HFMarkets-Demo"
  mt5_path: ""
  bridge_url: "http://91.99.85.255:5555"
  bridge_api_key: ""

# ─── ZONE DETECTION (PinShot deterministic thresholds) ───
zone_detection:
  spike_atr_mult: 1.0            # Departure body >= 1.0x ATR
  base_min_candles: 2
  base_max_candles: 6             # PinShot: max 6 mum origin box
  base_max_range_mult: 0.4       # Pin body <= 40% of range
  left_side_max_swings: 5        # Max 5 zigzags before zone (forex needs more tolerance)
  # Time-based (TF-independent) — bot converts to bars per timeframe
  lookback_minutes: 4320            # Scan last 72 hours
  max_zone_age_minutes: 2880        # Zone lives max 48 hours
  min_displacement: 1.0          # Departure displacement >= 1.0x zone height
  atr_period: 14
  use_trend_filter: true          # Demand at dips, supply at peaks
  wick_ratio_threshold: 0.6      # Wick >= 60% of candle range
  wick_to_body_min_ratio: 1.5    # Wick >= 1.5x body
  cluster_window_bars: 5
  cluster_dispersion_atr: 1.0
  departure_candles: 2           # Min 2 same-color departure candles
  departure_volume_ratio: 1.3
  volume_required: false
  fvg_enabled: true
  fvg_bonus_score: 10
  fvg_required: false
  near_miss_threshold_atr: 0.2
  near_miss_invalidate_count: 3
  hard_break_body_min_atr: 1.5
  hard_break_volume_ratio: 1.5
  reverse_retest_max_bars: 20
  # Conflict resolution
  conflict_overlap_pct: 0.3         # %30+ overlap = conflict
  conflict_distance_atr: 0.5        # 0.5 ATR mesafe = conflict
  opposite_cooldown_bars: 10        # Zit zone 10 bar icinde yasak
  allow_opposite_only_after_bos: true   # Zit zone sadece BOS sonrasi

# ─── QUALITY FILTERS (V-return cleanliness) ───
filters:
  enabled: true
  min_confidence: 50
  min_triangular_score: 40
  min_white_space_score: 35
  max_return_bars: 12            # V-return max bars (was 50)
  max_zone_height_atr: 1.5
  max_risk_atr: 1.8
  min_breakout_body_ratio: 0.6
  v_return_max_alternating: 3    # Max direction changes in return
  v_return_max_overlap_pct: 0.3
  v_return_max_swing_flips: 2

# ─── EXECUTION MODEL ───
execution:
  model: "hybrid_adaptive"
  entry_placement: "penetration"  # Better R:R than mid entry
  stop_model: "core"
  stop_buffer_atr: 0.3            # SL buffer = 0.3x ATR fraction
  tp_ratio: 2.5
  use_partial_tp: true
  partial_exit_pct: 0.5           # Close 50% at TP1
  tp1_rr: 2.0                    # Partial TP at 2R
  tp2_rr: 5.0                    # Runner target 5R (if fixed mode)
  use_breakeven: true
  breakeven_after_tp1: true
  trailing_enabled: true
  trailing_activation_rr: 2.0
  trailing_distance_mult: 1.5    # ATR trail multiplier (was 0.8)
  runner_mode: "atrTrail"        # fixed3R | fixed5R | atrTrail | swingTrail
  swing_lookback: 20
  max_hold_hours: 168            # 7 days max hold
  time_stop_bars:
    M5: 24
    M15: 20
    M30: 16
    H1: 12
    H4: 8
  min_confidence: 50              # Lowered to match backtest (was 55)
  risk_percent: 2.0               # Conservative — prevent large losses
  max_positions: 4                # PinShot max concurrent positions
  sl_buffer_pips: 3
  max_spread_pips: 12.0           # Wide for all hours (lot reduced for high spread)
  enable_cluster_risk: false      # Disabled — was blocking all trades
  cluster_max_risk_percent: 10.0  # Raised for when re-enabled

symbols:
  # Majör pariler
  - "EURUSD"
  - "GBPUSD"
  - "USDJPY"
  - "USDCHF"
  - "AUDUSD"
  - "NZDUSD"
  - "USDCAD"
  # Cross pariler
  - "EURGBP"
  - "EURJPY"
  - "GBPJPY"
  - "AUDJPY"
  - "NZDJPY"
  - "CADJPY"
  - "CHFJPY"
  - "EURCAD"
  - "EURAUD"
  - "GBPAUD"
  - "GBPCAD"
  - "AUDCAD"
  - "AUDNZD"
  - "AUDCHF"
  # Metaller
  - "XAUUSD"
  - "XAGUSD"
  # Endeksler
  - "USTEC"
  - "US30"
  - "US500"
  - "DE40"

scan_timeframes:
  - "M1"
  - "M5"
  - "M15"
  - "M30"
  - "H1"
  - "H4"

scan_interval: 30      # Bridge overload fix — 30s between full scan cycles

web:
  host: "0.0.0.0"
  port: 8080

# ─── REGIME FILTER ───
regime:
  enabled: true
  ema_fast: 20
  ema_slow: 50
  slope_lookback: 10
  atr_expansion_mult: 1.2
  efficiency_threshold: 0.35
  allow_countertrend_first_touch: false
  prefer_flips_in_strong_breaks: true

# ─── MULTI-TIMEFRAME BIAS ───
multi_timeframe:
  enabled: true
  bias_map:
    M5: M30
    M15: H1
    M30: H4
    H1: H4
  require_alignment_for_base_zones: true
  require_alignment_for_flips: false

# ─── AI META-FILTER ───
ai:
  enabled: false
  provider: "zai"
  model: "zai/glm-5"
  role: "meta_filter"
  min_confidence: 65
  only_borderline: true
  borderline_min_confidence: 55
  borderline_max_confidence: 75
  fail_open: true
  timeout_sec: 12

telegram:
  enabled: true
  bot_token: "8613491061:AAHq7TKcrIUvlMyp0xfjUtUvOeXpxjWbKUg"
  chat_id: "1465888792"

state_management:
  save_zone_on_fill_only: true
  burn_on_deep_touch: true
  shallow_touch_penetration_pct: 0.15
  deep_touch_penetration_pct: 0.45
  pending_order_expiry_bars:
    M5: 6
    M15: 5
    M30: 4
    H1: 3
    H4: 2
  traded_zone_ttl_days:
    M5: 2
    M15: 4
    M30: 7
    H1: 21
    H4: 45

notifications:
  signal_alert: true
  tp_hit_alert: true
  sl_hit_alert: true
  zone_detected_alert: false
