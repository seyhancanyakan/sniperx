<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SniperX Multi</title>
<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e4e4f0;font-family:monospace;overflow:hidden;height:100vh}
.top{display:flex;align-items:center;justify-content:space-between;padding:0 10px;height:36px;background:#101018;border-bottom:1px solid #1e1e3a;flex-shrink:0}
.logo{font-size:14px;font-weight:900;color:#f59e0b;cursor:pointer}
.btns{display:flex;gap:4px}
.btn{padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;border-radius:4px;border:1px solid #a855f7;color:#a855f7;background:none;font-family:monospace}
.btn.active{background:#a855f7;color:#fff}
.btn-g{border-color:#22c55e;color:#22c55e}.btn-g.active{background:#22c55e;color:#fff}
.btn-b{border-color:#3b82f6;color:#3b82f6}.btn-b.active{background:#3b82f6;color:#fff}
.btn-a{border-color:#f59e0b;color:#f59e0b}.btn-a.active{background:#f59e0b;color:#000}
.main{display:flex;height:calc(100vh - 36px)}
.sidebar{width:0;overflow:hidden;transition:width 0.2s;background:#101018;border-right:1px solid #1e1e3a;flex-shrink:0}
.sidebar.open{width:280px;overflow-y:auto}
.sidebar h3{font-size:11px;font-weight:800;color:#a855f7;padding:8px 10px 4px;text-transform:uppercase;letter-spacing:1px}
.sidebar .card{margin:4px 8px;padding:8px;background:#16162a;border:1px solid #1e1e3a;border-radius:6px;font-size:10px}
.sidebar .card-t{font-size:10px;font-weight:800;color:#8888aa;margin-bottom:4px}
.sidebar .row{display:flex;justify-content:space-between;padding:2px 0;color:#e4e4f0}
.sidebar .row .v{font-weight:700}
.sidebar .grn{color:#22c55e}.sidebar .red{color:#ef4444}.sidebar .dim{color:#555570}
.zi{padding:6px 8px;margin:3px 8px;background:#16162a;border:1px solid #1e1e3a;border-radius:6px;cursor:pointer;font-size:10px;border-left:3px solid #22c55e}
.zi.sell{border-left-color:#ef4444}
.zi:hover{background:#1e1e38}
.zi .zh{display:flex;justify-content:space-between;font-weight:700}
.zi .zd{color:#8888aa;font-size:9px;margin-top:2px}
.trade-item{padding:4px 8px;margin:2px 8px;background:#16162a;border:1px solid #1e1e3a;border-radius:4px;font-size:9px}
.charts{flex:1;display:flex;flex-wrap:wrap;overflow:hidden;height:100%}
.cell{position:relative;border:1px solid #1e1e3a;box-sizing:border-box;overflow:hidden}
.cell .lbl{position:absolute;top:4px;left:6px;z-index:5;font-size:12px;font-weight:900;color:#f59e0b;text-shadow:0 1px 4px #000}
.cell .prc{position:absolute;top:20px;left:6px;z-index:5;font-size:18px;font-weight:900;text-shadow:0 1px 4px #000}
.cell .ctrls{position:absolute;top:4px;right:6px;z-index:5;display:flex;gap:4px}
.cell .ctrls span{cursor:pointer;color:#888;font-size:14px;padding:2px 4px;background:rgba(255,255,255,0.05);border-radius:3px}
.cell .ctrls span:hover{color:#fff;background:rgba(255,255,255,0.15)}
.full .cell{display:none}
.full .cell.active{display:block;width:100%!important;height:100%!important}
.empty{color:#555570;font-size:10px;padding:8px}
</style>
</head>
<body>
<div class="top">
  <span class="logo" onclick="toggleSidebar()">SNIPERX</span>
  <div class="btns">
    <button class="btn btn-b" onclick="toggleSidebar()" id="btnPanel" title="Panel">&#9776;</button>
    <button class="btn" onclick="setCount(2)">2X</button>
    <button class="btn" onclick="setCount(3)">3X</button>
    <button class="btn" onclick="setCount(4)">4X</button>
    <button class="btn" onclick="setCount(5)">5X</button>
    <button class="btn active" onclick="setCount(6)">6X</button>
    <button class="btn" onclick="location.href=BASE+'/'">1X</button>
  </div>
  <div class="btns" id="tfBtns">
    <button class="btn tf-btn" onclick="setTF('M1')">1m</button>
    <button class="btn tf-btn" onclick="setTF('M5')">5m</button>
    <button class="btn tf-btn" onclick="setTF('M15')">15m</button>
    <button class="btn tf-btn" onclick="setTF('M30')">30m</button>
    <button class="btn tf-btn" onclick="setTF('H1')">1H</button>
    <button class="btn tf-btn" onclick="setTF('H4')">4H</button>
    <button class="btn tf-btn" onclick="setTF('D1')">1D</button>
  </div>
</div>
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <!-- Account -->
    <h3>Account</h3>
    <div class="card">
      <div class="row"><span>Balance</span><span class="v" id="sBalance">-</span></div>
      <div class="row"><span>Equity</span><span class="v" id="sEquity">-</span></div>
      <div class="row"><span>PnL</span><span class="v" id="sPnl">-</span></div>
    </div>

    <!-- Performance -->
    <h3>Performance</h3>
    <div class="card">
      <div class="row"><span>Total R</span><span class="v" id="sTotalR">0</span></div>
      <div class="row"><span>Win Rate</span><span class="v" id="sWinRate">0%</span></div>
      <div class="row"><span>Trades</span><span class="v" id="sTrades">0</span></div>
      <div class="row"><span>PF</span><span class="v" id="sPF">0</span></div>
    </div>

    <!-- Active Zones -->
    <h3>Active Zones <span id="sZoneCount" style="color:#555"></span></h3>
    <div id="sZones"><div class="empty">Scanning...</div></div>

    <!-- Trade History -->
    <h3>Trade History</h3>
    <div id="sHistory"><div class="empty">No trades yet</div></div>

    <!-- AI Learning -->
    <h3>AI Learning</h3>
    <div class="card">
      <div class="row"><span>Patterns</span><span class="v" id="sPatterns">0</span></div>
      <div class="row"><span>Annotations</span><span class="v" id="sAnnotations">0</span></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts" id="wrap"></div>
</div>

<script>
// Auto-detect base path
var path=location.pathname;
var BASE='';
if(path.indexOf('/sniperx/')>=0) BASE='/sniperx';
var API=BASE+'/api';
var count=3;
var sidebarOpen=localStorage.getItem('multiSidebar')==='1';

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open',sidebarOpen);
  document.getElementById('btnPanel').classList.toggle('active',sidebarOpen);
  localStorage.setItem('multiSidebar',sidebarOpen?'1':'0');
  setTimeout(function(){window.dispatchEvent(new Event('resize'))},250);
}

function updateSidebar(d){
  if(!d) return;
  // Account
  var a=d.account||{};
  var el;
  el=document.getElementById('sBalance'); if(el) el.textContent=(a.balance||0).toFixed(2)+' '+(a.currency||'');
  el=document.getElementById('sEquity'); if(el) el.textContent=(a.equity||0).toFixed(2);
  var pnl=((a.equity||0)-(a.balance||0));
  el=document.getElementById('sPnl'); if(el){el.textContent=pnl.toFixed(2);el.className='v '+(pnl>=0?'grn':'red');}

  // Stats
  var s=d.stats||{};
  el=document.getElementById('sTotalR'); if(el){el.textContent=(s.total_r||0)+'R';el.className='v '+((s.total_r||0)>=0?'grn':'red');}
  el=document.getElementById('sWinRate'); if(el) el.textContent=(s.win_rate||0)+'%';
  el=document.getElementById('sTrades'); if(el) el.textContent=(s.trades||0)+' (W:'+(s.wins||0)+' L:'+(s.losses||0)+')';
  el=document.getElementById('sPF'); if(el) el.textContent=(s.profit_factor||0);

  // Zones
  var zl=d.zones||[];
  var activeZ=zl.filter(function(z){return z.status==='active'||z.status==='departed'||z.status==='watching';});
  el=document.getElementById('sZoneCount'); if(el) el.textContent='('+activeZ.length+')';
  var ze=document.getElementById('sZones');
  if(ze){
    if(!activeZ.length){ze.innerHTML='<div class="empty">No active zones</div>';}
    else{
      ze.innerHTML=activeZ.slice(0,15).map(function(z){
        var dir=z.zone_type==='demand'?'buy':'sell';
        var cls=dir==='sell'?'sell':'';
        return '<div class="zi '+cls+'" onclick="goZoneMulti(\''+z.symbol+'\',\''+z.timeframe+'\')">'+
          '<div class="zh"><span>'+(dir==='buy'?'D':'S')+' '+z.symbol+'</span><span>'+z.timeframe+' '+(z.confidence||0).toFixed(0)+'%</span></div>'+
          '<div class="zd">'+z.high.toFixed(5)+' — '+z.low.toFixed(5)+' P:'+z.pin_count+'</div></div>';
      }).join('');
    }
  }

  // Positions as trade history
  var pos=d.positions||[];
  var he=document.getElementById('sHistory');
  if(he){
    var closed=pos.filter(function(p){return p.status==='closed';});
    var open=pos.filter(function(p){return p.status==='open'||p.status==='partial';});
    var html='';
    if(open.length){
      html+='<div style="padding:2px 8px;font-size:9px;color:#f59e0b;font-weight:700">OPEN ('+open.length+')</div>';
      open.forEach(function(p){
        var clr=p.r_result>=0?'#22c55e':'#ef4444';
        html+='<div class="trade-item"><span style="color:'+clr+'">'+p.direction.toUpperCase()+' '+p.symbol+' '+(p.r_result||0)+'R</span></div>';
      });
    }
    if(closed.length){
      html+='<div style="padding:2px 8px;font-size:9px;color:#555;font-weight:700;margin-top:4px">CLOSED ('+closed.slice(-10).length+')</div>';
      closed.slice(-10).reverse().forEach(function(p){
        var clr=p.r_result>=0?'#22c55e':'#ef4444';
        html+='<div class="trade-item"><span style="color:'+clr+'">'+p.direction.toUpperCase()+' '+p.symbol+' '+(p.r_result||0)+'R</span></div>';
      });
    }
    if(!html) html='<div class="empty">No trades yet</div>';
    he.innerHTML=html;
  }
}

function goZoneMulti(sym,tfName){
  syms[0]=sym;
  // Switch TF first (this triggers full rebuild)
  if(tfName!==tf){
    tf=tfName;
    localStorage.setItem('multiTf',tfName);
    document.querySelectorAll('.tf-btn').forEach(function(b){b.classList.remove('active');});
    var active=document.querySelector('.tf-btn[onclick="setTF(\''+tfName+'\')"]');
    if(active) active.classList.add('active');
  }
  // Rebuild all charts (ensures first chart has the right symbol)
  loaded=[];
  zoneLayers=[];
  build();
  localStorage.setItem('multiSyms',JSON.stringify(syms));
}
var charts=[];
var series=[];
var zoneLayers=[];  // per-chart zone series for cleanup
var loaded=[];      // track if chart has initial data
var syms=[];
var allSyms=[];
var zones=[];
var tf=localStorage.getItem('multiTf')||'M15';
var fullIdx=-1;

// Init
if(sidebarOpen) document.getElementById('sidebar').classList.add('open');
if(sidebarOpen) document.getElementById('btnPanel').classList.add('active');

fetch(API+'/data').then(function(r){return r.json()}).then(function(d){
  allSyms=d.symbols||[];
  zones=d.zones||[];
  var zc={};
  zones.forEach(function(z){zc[z.symbol]=(zc[z.symbol]||0)+1;});
  var sorted=Object.keys(zc).sort(function(a,b){return zc[b]-zc[a];});
  var rest=allSyms.filter(function(s){return sorted.indexOf(s)<0;});
  allSyms=sorted.concat(rest);
  var saved=parseInt(localStorage.getItem('multiCount'))||6;
  setCount(saved);
  document.querySelectorAll('.tf-btn').forEach(function(b){
    b.classList.toggle('active',b.textContent.trim()==={'M1':'1m','M5':'5m','M15':'15m','M30':'30m','H1':'1H','H4':'4H','D1':'1D'}[tf]);
  });
  updateSidebar(d);
  // AI learning stats
  fetch(API+'/learning/stats').then(function(r){return r.json()}).then(function(ls){
    var el=document.getElementById('sPatterns'); if(el) el.textContent=ls.total_patterns||0;
    el=document.getElementById('sAnnotations'); if(el) el.textContent=ls.total_annotations||0;
  }).catch(function(){});
});

function setTF(newTF){
  tf=newTF;
  localStorage.setItem('multiTf',newTF);
  document.querySelectorAll('.tf-btn').forEach(function(b){b.classList.remove('active');});
  var active=document.querySelector('.tf-btn[onclick="setTF(\''+newTF+'\')"]');
  if(active) active.classList.add('active');
  // TF degisti — tum chart'lari bastan yukle
  loaded=[];
  for(var i=0;i<count;i++) loadData(i);
  // Label'lari guncelle
  for(var i=0;i<count;i++){
    var lbl=document.getElementById('lbl'+i);
    if(lbl) lbl.innerHTML=syms[i]+' <span style="color:#a855f7;font-size:10px">'+tf+'</span>';
  }
}

function setCount(n){
  count=n;
  fullIdx=-1;
  loaded=[];
  zoneLayers=[];
  localStorage.setItem('multiCount',n);
  document.querySelectorAll('.btn').forEach(function(b){b.classList.remove('active');});
  var b=document.querySelector('.btn[onclick="setCount('+n+')"]');
  if(b) b.classList.add('active');

  // Sembolleri sec — localStorage'dan veya default
  var savedSyms=localStorage.getItem('multiSyms');
  if(savedSyms){
    try{
      var parsed=JSON.parse(savedSyms);
      if(parsed.length>=n){
        syms=parsed.slice(0,n);
      } else {
        syms=parsed.concat(allSyms.filter(function(s){return parsed.indexOf(s)<0;}).slice(0,n-parsed.length));
      }
    }catch(e){
      syms=[];
      for(var i=0;i<n;i++) syms.push(allSyms[i]||'EURUSD');
    }
  } else {
    syms=[];
    for(var i=0;i<n;i++) syms.push(allSyms[i]||'EURUSD');
  }

  build();
}

function build(){
  // Temizle
  charts.forEach(function(c){try{c.remove()}catch(e){}});
  charts=[];series=[];

  var wrap=document.getElementById('wrap');
  wrap.className='charts';
  var html='';

  for(var i=0;i<count;i++){
    var w,h;
    if(count<=2){w='50%';h='100%';}
    else if(count<=3){w='33.33%';h='100%';}
    else if(count<=4){w='50%';h='50%';}
    else if(count<=6){w='33.33%';h='50%';}
    else{w='25%';h='50%';}

    html+='<div class="cell" id="cell'+i+'" style="width:'+w+';height:'+h+'">';
    html+='<div class="lbl" id="lbl'+i+'">'+syms[i]+' <span style="color:#a855f7;font-size:10px">'+tf+'</span></div>';
    html+='<div class="prc" id="prc'+i+'">--</div>';
    html+='<div class="ctrls">';
    html+='<span onclick="nextSym('+i+')" title="Sonraki parite">▶</span>';
    html+='<span onclick="goFull('+i+')" title="Tam ekran">⛶</span>';
    html+='</div>';
    html+='<div id="ch'+i+'" style="width:100%;height:100%"></div>';
    html+='</div>';
  }
  wrap.innerHTML=html;

  // Chart olustur — wait for DOM layout
  setTimeout(function(){
    for(var i=0;i<count;i++) createChart(i);
  },300);
}

function createChart(idx){
  var el=document.getElementById('ch'+idx);
  if(!el) return;
  var r=el.getBoundingClientRect();
  if(r.width<10||r.height<10){
    setTimeout(function(){createChart(idx)},300);
    return;
  }

  var c=LightweightCharts.createChart(el,{
    width:Math.max(r.width,50),
    height:Math.max(r.height,50),
    layout:{background:{type:'solid',color:'#0a0a0f'},textColor:'#8888aa',fontFamily:'monospace',fontSize:9},
    grid:{vertLines:{color:'#1a1a2e'},horzLines:{color:'#1e1e38'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1e1e3a',visible:true,minimumWidth:45},
    timeScale:{borderColor:'#1e1e3a',timeVisible:true,secondsVisible:false,rightOffset:15,barSpacing:count>=6?1.5:count>=5?2:count>=4?3:5},
    handleScroll:{mouseWheel:true,pressedMouseMove:true},
    handleScale:{mouseWheel:true,pinch:true},
  });

  var pf={type:'price',precision:5,minMove:0.00001};
  var sym=syms[idx].toUpperCase();
  if(sym.indexOf('JPY')>=0) pf={type:'price',precision:3,minMove:0.001};
  if(sym.indexOf('XAU')>=0) pf={type:'price',precision:2,minMove:0.01};
  if(sym.indexOf('XAG')>=0) pf={type:'price',precision:3,minMove:0.001};
  if(sym.match(/US1|US3|US5|DE4|USTEC/)) pf={type:'price',precision:1,minMove:0.1};

  var s=c.addCandlestickSeries({
    upColor:'#22c55e',downColor:'#ef4444',borderUpColor:'#22c55e',borderDownColor:'#ef4444',
    wickUpColor:'#22c55e',wickDownColor:'#ef4444',
    lastValueVisible:true,priceLineVisible:true,priceLineColor:'#f59e0b',priceLineStyle:2,
    priceFormat:pf,
  });

  charts[idx]=c;
  series[idx]=s;

  new ResizeObserver(function(entries){
    var cr=entries[0].contentRect;
    if(cr.width>10&&cr.height>10) c.applyOptions({width:cr.width,height:cr.height});
  }).observe(el);

  loadData(idx);
}

function loadData(idx){
  var sym=syms[idx];
  if(!sym) return;
  var cnt=loaded[idx]?2:200;  // First load: 200, updates: only last 2
  fetch(API+'/candles/'+encodeURIComponent(sym)+'?timeframe='+tf+'&count='+cnt)
  .then(function(r){if(!r.ok) throw new Error(r.status);return r.json()})
  .then(function(d){
    var raw=(d.candles||[]).filter(function(x){return x.time&&x.open;}).sort(function(a,b){return a.time-b.time;});
    var u=[];var lt=0;
    raw.forEach(function(x){if(x.time>lt){u.push(x);lt=x.time;}});
    if(!u.length||!series[idx]) return;

    if(!loaded[idx]){
      series[idx].setData(u);
      charts[idx].timeScale().fitContent();
      loaded[idx]=true;
      drawZonesForChart(idx, sym);
    } else {
      var last=u[u.length-1];
      series[idx].update(last);
    }

    // Fiyat
    var last=u[u.length-1];
    var el=document.getElementById('prc'+idx);
    if(last&&el){
      var dec=5;
      if(last.close>1000) dec=1;
      else if(last.close>10) dec=3;
      el.textContent=last.close.toFixed(dec);
      el.style.color=last.close>=last.open?'#22c55e':'#ef4444';
    }
  }).catch(function(e){
    console.error('loadData error for '+sym+':',e);
    var el=document.getElementById('prc'+idx);
    if(el){el.textContent='ERR';el.style.color='#ef4444';}
  });
}

function drawZonesForChart(idx, sym){
  // Temizle
  if(zoneLayers[idx]){
    zoneLayers[idx].forEach(function(zs){try{charts[idx].removeSeries(zs)}catch(e){}});
  }
  zoneLayers[idx]=[];

  if(!charts[idx]) return;

  var tfSec={'M1':60,'M5':300,'M15':900,'M30':1800,'H1':3600,'H4':14400,'D1':86400};
  var cSec=tfSec[tf]||60;
  var now=Math.floor(Date.now()/1000);
  var zf=zones.filter(function(z){return z.symbol===sym && z.timeframe===tf;}).slice(0,6);

  zf.forEach(function(z){
    var t1=z.start_time||0;
    if(!t1) return;
    var st=z.status||'';
    var isLive=(st==='fresh'||st==='active'||st==='departed'||st==='watching');
    var t2=isLive?(now+cSec*3):Math.min(now,(z.end_time||t1)+cSec*20);
    var isDemand=(z.zone_type||z.type)==='demand';
    var pts=[];
    for(var t=t1;t<=t2;t+=cSec) pts.push({time:t,value:z.high});
    if(pts.length<2) return;
    try{
      var zSeries=charts[idx].addBaselineSeries({
        baseValue:{type:'price',price:z.low},
        topLineColor:isDemand?'rgba(34,197,94,0.5)':'rgba(239,68,68,0.5)',
        topFillColor1:isDemand?'rgba(34,197,94,0.12)':'rgba(239,68,68,0.12)',
        topFillColor2:isDemand?'rgba(34,197,94,0.12)':'rgba(239,68,68,0.12)',
        bottomLineColor:'transparent',bottomFillColor1:'transparent',bottomFillColor2:'transparent',
        lineWidth:1,lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false,
      });
      zSeries.setData(pts);
      zoneLayers[idx].push(zSeries);
    }catch(e){}
  });
}

function nextSym(idx){
  var ci=allSyms.indexOf(syms[idx]);
  syms[idx]=allSyms[(ci+1)%allSyms.length];
  document.getElementById('lbl'+idx).innerHTML=syms[idx]+' <span style="color:#a855f7;font-size:10px">'+tf+'</span>';
  // Sembol degisti — bastan yukle
  loaded[idx]=false;
  zoneLayers[idx]=[];
  if(charts[idx]){try{charts[idx].remove()}catch(e){}}
  createChart(idx);
  // Sembolleri kaydet
  localStorage.setItem('multiSyms',JSON.stringify(syms));
}

function goFull(idx){
  var wrap=document.getElementById('wrap');
  if(fullIdx===idx){
    // Cik
    fullIdx=-1;
    wrap.classList.remove('full');
    for(var i=0;i<count;i++){
      var cell=document.getElementById('cell'+i);
      if(cell) cell.classList.remove('active');
    }
  } else {
    fullIdx=idx;
    wrap.classList.add('full');
    for(var i=0;i<count;i++){
      var cell=document.getElementById('cell'+i);
      if(cell){
        if(i===idx) cell.classList.add('active');
        else cell.classList.remove('active');
      }
    }
  }
  // Resize
  setTimeout(function(){window.dispatchEvent(new Event('resize'));},150);
}

// ─── WEBSOCKET LIVE UPDATES ───
var ws=null;
var wsRetry=0;
function connectWS(){
  var proto=location.protocol==='https:'?'wss:':'ws:';
  var wsBase=location.pathname.indexOf('/sniperx/')>=0?'/sniperx':'';
  var url=proto+'//'+location.host+wsBase+'/ws';
  ws=new WebSocket(url);
  ws.onopen=function(){
    wsRetry=0;
    // Subscribe all visible symbols
    if(syms.length&&tf) ws.send(JSON.stringify({symbols:syms,tf:tf}));
  };
  ws.onmessage=function(e){
    try{
      var d=JSON.parse(e.data);
      if(d.type==='update'){
        // Update sidebar
        if(sidebarOpen) updateSidebar(d);
        // Update zones
        if(d.zones){
          var oldHash=JSON.stringify(zones.map(function(z){return (z.start_time||0)+'_'+z.high}));
          var newHash=JSON.stringify(d.zones.map(function(z){return (z.start_time||0)+'_'+z.high}));
          zones=d.zones;
          if(oldHash!==newHash){
            for(var i=0;i<count;i++) drawZonesForChart(i, syms[i]);
          }
        }
        // Update live candles per symbol
        if(d.live_candles){
          for(var i=0;i<count;i++){
            var sym=syms[i];
            var candle=d.live_candles[sym];
            if(candle&&series[i]&&loaded[i]){
              try{
                series[i].update(candle);
                // Update price display
                var el=document.getElementById('prc'+i);
                if(el){
                  var dec=5;
                  if(candle.close>1000) dec=1;
                  else if(candle.close>10) dec=3;
                  el.textContent=candle.close.toFixed(dec);
                  el.style.color=candle.close>=candle.open?'#22c55e':'#ef4444';
                }
              }catch(ex){}
            }
          }
        }
      }
    }catch(ex){}
  };
  ws.onclose=function(){
    wsRetry++;
    var delay=Math.min(wsRetry*2000,10000);
    setTimeout(connectWS,delay);
  };
  ws.onerror=function(){ws.close()};
}
connectWS();

// Mum full refresh — every 5 seconds (WS gives live tick, this catches new bars)
setInterval(function(){
  for(var i=0;i<count;i++) loadData(i);
},5000);

// Resubscribe when TF or symbols change
var _origSetTF=setTF;
setTF=function(newTF){
  _origSetTF(newTF);
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({symbols:syms,tf:newTF}));
};
var _origNextSym=nextSym;
nextSym=function(idx){
  _origNextSym(idx);
  if(ws&&ws.readyState===1) ws.send(JSON.stringify({symbols:syms,tf:tf}));
};
</script>
</body>
